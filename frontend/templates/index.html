{% extends "base.html" %}
{% block title %}Buscar Atividades - 365 STEM{% endblock %}
{% block content %}
<div class="search-box">
    <h1>365 Atividades STEM</h1>
    <p>Busque atividades por nome ou tag</p>
    <div class="search-form">
        <input type="text" id="searchTerm" placeholder="Digite o nome da atividade..." autofocus>
        <details class="tag-filter" id="tagFilter">
            <summary>Filtrar tags<span class="tag-count" id="tagCount"></span></summary>
            <div class="tag-filter-options">
                <label><input type="checkbox" value="ciência">Ciência</label>
                <label><input type="checkbox" value="tecnologia">Tecnologia</label>
                <label><input type="checkbox" value="engenharia">Engenharia</label>
                <label><input type="checkbox" value="matemática">Matemática</label>
                <label><input type="checkbox" value="arte">Arte</label>
                <button type="button" class="btn-clear-tags" onclick="limparTags()">Limpar</button>
            </div>
        </details>
        <details class="tag-filter" id="statusFilter">
            <summary>Filtrar status</summary>
            <div class="tag-filter-options">
                <label><input type="radio" name="status" value="" checked>Todas</label>
                <label><input type="radio" name="status" value="done">Com análise</label>
                <label><input type="radio" name="status" value="pending">Sem análise</label>
            </div>
        </details>
        <button onclick="buscar()">Buscar</button>
    </div>
</div>

<div id="results" class="results"></div>

<script>
    const input = document.getElementById("searchTerm");
    input.addEventListener("keyup", (e) => { if (e.key === "Enter") buscar(); });

    const tagCount = document.getElementById("tagCount");
    function updateTagCount() {
        const n = document.querySelectorAll("#tagFilter input:checked").length;
        tagCount.textContent = n > 0 ? ` (${n})` : "";
    }
    document.querySelectorAll("#tagFilter input[type=checkbox]").forEach(el => {
        el.addEventListener("change", updateTagCount);
    });

    function limparTags() {
        document.querySelectorAll("#tagFilter input:checked").forEach(el => el.checked = false);
        updateTagCount();
        buscar();
    }

    async function buscar() {
        document.getElementById("tagFilter").removeAttribute("open");
        document.getElementById("statusFilter").removeAttribute("open");
        const searchTerm = document.getElementById("searchTerm").value.trim();
        const tagInputs = document.querySelectorAll("#tagFilter input:checked");
        const tags = Array.from(tagInputs).map(el => el.value);
        const statusInput = document.querySelector("#statusFilter input:checked");
        const status = statusInput ? statusInput.value : "";
        let url = "/api/activities?";
        if (searchTerm) url += "search_term=" + encodeURIComponent(searchTerm) + "&";
        for (const t of tags) url += "tag=" + encodeURIComponent(t) + "&";
        if (status) url += "status=" + encodeURIComponent(status);
        const res = await fetch(url);
        const data = await res.json();
        const container = document.getElementById("results");
        if (data.length === 0) {
            container.innerHTML = "<p class='empty'>Nenhuma atividade encontrada.</p>";
            return;
        }
        let html = `<p class="count">${data.length} atividade(s) encontrada(s)</p>`;
        html += "<table><thead><tr><th>Nº</th><th>Página</th><th>Título</th><th>Tags</th><th>Análise</th></tr></thead><tbody>";
        for (const activity of data) {
            const hasAnalysis = activity.analysis
              ? '<span class="badge badge-done">Feito</span>'
              : '<span class="badge badge-pending">Pendente</span>';
            html += `<tr>
                <td class="num">${activity.activity_number}</td>
                <td class="page">${activity.page_number}</td>
                <td><a href="/atividade/${activity.id}" class="title-link">${activity.title}</a></td>
                <td class="tags">${formatTags(activity.tags)}</td>
                <td class="analysis-icon">${hasAnalysis}</td>
            </tr>`;
        }
        html += "</tbody></table>";
        container.innerHTML = html;
    }

    function formatTags(tags) {
        if (!tags) return "";
        return tags.split(",").map(t => `<span class="tag">${t.trim()}</span>`).join(" ");
    }

    buscar();
</script>
{% endblock %}
