services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=sumario
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sumario
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumario"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sumario:${POSTGRES_PASSWORD}@db:5432/sumario
    volumes:
      - ./sumario.csv:/app/sumario.csv:Z
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
